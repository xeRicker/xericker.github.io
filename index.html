<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Generator Listy</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@0&display=swap" rel="stylesheet">
</head>
<body>

<div id="confetti-container"></div>

<div class="container">

  <div class="header-bar animate-stagger">
    <h1>GENERATOR LISTY</h1>
    <a href="admin.html" class="btn-admin">
      ADMIN
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
    </a>
  </div>

  <div class="generator-tabs animate-stagger" role="tablist" aria-label="Widoki generatora">
    <button class="generator-tab is-active" type="button" data-tab="generator" role="tab" aria-selected="true">GENERATOR</button>
    <button class="generator-tab" type="button" data-tab="workers" role="tab" aria-selected="false">PRACOWNICY</button>
  </div>

  <div id="generatorPanel" class="tab-panel is-active">
    <div class="section-card animate-stagger">
      <h2><span class="title-icon material-symbols-rounded" aria-hidden="true">payments</span> UTARG</h2>
      <div class="revenue-grid">
        <div class="revenue-field">
          <label><span class="field-icon material-symbols-rounded" aria-hidden="true">store</span> UTARG LOKALU</label>
          <div class="input-group">
            <span class="currency-symbol">PLN</span>
            <input type="number" id="revenueInput" placeholder="0.00" step="0.01" inputmode="decimal">
          </div>
        </div>
        <div class="revenue-field">
          <label><span class="field-icon material-symbols-rounded" aria-hidden="true">credit_card</span> KARTY</label>
          <div class="input-group">
            <span class="currency-symbol">PLN</span>
            <input type="number" id="cardRevenueInput" placeholder="0.00" step="0.01" inputmode="decimal">
          </div>
        </div>
        <div class="revenue-field">
          <label><span class="field-icon field-icon--glovo material-symbols-rounded" aria-hidden="true">delivery_dining</span> GLOVO</label>
          <div class="input-group input-group--glovo">
            <span class="currency-symbol">PLN</span>
            <input type="number" id="glovoRevenueInput" placeholder="0.00" step="0.01" inputmode="decimal">
          </div>
        </div>
      </div>
      <div class="revenue-insights">
        <div id="revenueValidation" class="revenue-note"></div>
        <div id="glovoNetInfo" class="revenue-note revenue-note--accent"></div>
      </div>
    </div>

    <div class="section-card animate-stagger">
      <h2><span class="title-icon material-symbols-rounded" aria-hidden="true">groups</span> EKIPA</h2>
      <div id="employees" class="employees-grid"></div>
    </div>

    <div id="products"></div>

    <div class="spacer-bottom"></div>
  </div>

  <div id="workersPanel" class="tab-panel">
    <div class="chart-card calc-card animate-stagger worker-card">
      <div class="chart-header">
        <div class="section-heading">
          <h3>Kalkulator Godzin</h3>
          <p>Ten sam przelicznik co w panelu admina. Wybierz pracownika, stawkę i zakres dat.</p>
        </div>
      </div>
      <div class="calc-grid">
        <div class="calc-input-group">
          <label>Pracownik</label>
          <select id="workerCalcEmployee" class="calc-input"></select>
        </div>
        <div class="calc-input-group">
          <label>Stawka</label>
          <div class="rate-input-wrapper">
            <input type="number" id="workerCalcRate" value="25" step="0.5">
            <span>PLN</span>
          </div>
        </div>
      </div>
      <div class="calc-grid">
        <div class="calc-input-group">
          <label>Od daty</label>
          <input type="date" id="workerCalcDateFrom" class="calc-input">
        </div>
        <div class="calc-input-group">
          <label>Do daty</label>
          <input type="date" id="workerCalcDateTo" class="calc-input">
        </div>
      </div>

      <div id="workerCalcResult" class="calc-result-box" style="display:none;">
        <div class="calc-res-item">
          <h4>
            <svg class="calc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            GODZINY
          </h4>
          <p id="workerResHours">0 h</p>
        </div>
        <div class="calc-res-item">
          <h4>
            <svg class="calc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"></rect><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
            WYPŁATA
          </h4>
          <p id="workerResMoney" class="money">0 zł</p>
        </div>
      </div>
      <div id="workerCalcDetails" style="margin-top: 15px; font-size: 13px; color: #aaa; display:none;"></div>
    </div>
  </div>
</div>

<div id="generatorFloatingBar" class="floating-bar animate-slide-up">
  <div id="resetContainer" style="display: none;">
    <button class="icon-button reset-button" aria-label="Reset">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <button id="copyButton" class="primary-fab">
    <span>SKOPIUJ LISTĘ</span>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
  </button>
</div>

<div id="locationOverlay" class="overlay"></div>

<div id="locationSheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <h3>Wybierz punkt</h3>
  <div class="sheet-actions">
    <button class="sheet-btn location-button" data-location="Oświęcim">
      <span class="loc-icon material-symbols-rounded" aria-hidden="true">location_city</span> OŚWIĘCIM
    </button>
    <button class="sheet-btn location-button" data-location="Osiek">
      <span class="loc-icon material-symbols-rounded" aria-hidden="true">cottage</span> OSIEK
    </button>
    <button class="sheet-btn cancel-btn" onclick="document.getElementById('locationOverlay').click()">ANULUJ</button>
  </div>
</div>

<div id="successSheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="success-icon-wrapper" id="successIcon"></div>
  <h3>LISTA GOTOWA!</h3>
  <p class="success-msg">Kliknij poniżej, aby skopiować i wklej na Messengerze.</p>
  <div class="sheet-actions">
    <button id="finalCopyBtn" class="sheet-btn success-close-btn">SKOPIUJ</button>
  </div>
</div>

<script type="module" src="js/main.js?v=10"></script>
</body>
</html>
